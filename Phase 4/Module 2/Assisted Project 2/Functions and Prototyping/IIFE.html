<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Example</title>
</head>

<body>
    <h1>Basic Example</h1>

    <div id="output"></div>

    <script>
        // IIFE (Immediately Invoked Function Expression)
        (function chai() {
            // named IIFE
            console.log('DB CONNECTED');
        })();

        // IIFE with arrow function and template literals
        ((name) => {
            console.log(`DB CONNECTED ${name}`);
        })('Naresh');


    </script>
</body>

</html>
